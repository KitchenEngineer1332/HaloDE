# Halo DE Default Configuration

[output:DP-1]
mode=2560x1440@144
scale=1.5
position=0,0
transform=normal
vrr=true

[input:type:touchpad]
tap_to_click=true
natural_scroll=true
accel_profile=adaptive

[keybinds]
# Workspace switching
SUPER+1 = workspace 1
SUPER+2 = workspace 2
SUPER+3 = workspace 3

# Window management
SUPER+Q = close_focused
SUPER+F = toggle_fullscreen
SUPER+SPACE = toggle_floating

# App shortcuts
SUPER+Return = exec kitty
SUPER+D = exec halo-launcher

[animations]
enabled=true
duration=250 # ms
easing=ease_out_expo

[theme]
mode=dark
accent_color=#00ff99
border_width=2
border_radius=8
blur=true
shadows=true
